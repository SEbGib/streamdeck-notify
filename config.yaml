deck:
  brightness: 70
  refresh_interval: 30  # seconds

# Button layout (Stream Deck MK.2 = 3 rows x 5 cols, 0-14)
# Row 1: notifications
# Row 2: notifications (continued)
# Row 3: actions / system

buttons:
  0:
    plugin: slack
    label: "Slack"
    icon: "slack.png"
    action: "xdg-open https://app.slack.com"

  1:
    plugin: google_calendar
    label: "Agenda"
    icon: "calendar.png"
    action: "xdg-open https://calendar.google.com"

  2:
    plugin: gmail
    label: "Gmail"
    icon: "gmail.png"
    action: "xdg-open https://mail.google.com"

  3:
    plugin: gitlab
    label: "GitLab"
    icon: "gitlab.png"
    action: "xdg-open https://gitlab.com/dashboard/merge_requests?assignee_username=current_user"

  4:
    plugin: github
    label: "GitHub"
    icon: "github.png"
    action: "xdg-open https://github.com/notifications"

  # Row 2: monitoring & utilities
  5:
    plugin: cicd
    label: "CI/CD"
    icon: "cicd.png"
    action: "xdg-open https://gitlab.com/dashboard/pipelines"

  6:
    plugin: docker
    label: "Docker"
    icon: "docker.png"

  7:
    plugin: weather
    label: "Météo"
    icon: "weather.png"

  8:
    plugin: system_cpu
    label: "CPU"
    icon: "system.png"

  9:
    plugin: system_ram
    label: "RAM"
    icon: "system.png"

  10:
    plugin: spotify
    label: "Spotify"
    icon: "spotify.png"

# Plugin-specific configuration
plugins:
  slack:
    # Method: "api" (needs token) or "dbus" (monitors desktop notifications)
    method: "dbus"
    # Only needed if method is "api":
    # token: "${SLACK_TOKEN}"
    # channels: ["general", "team-retail"]

  google_calendar:
    # Auth via GNOME Online Accounts (automatic, no OAuth app needed)
    # identity: "user@example.com"  # Optional: filter if multiple Google accounts
    lookahead_minutes: 60

  gmail:
    # Auth via GNOME Online Accounts + IMAP (automatic)
    # identity: "user@example.com"  # Optional: filter if multiple Google accounts

  gitlab:
    # Uses glab CLI token automatically
    host: "gitlab.com"

  github:
    # Uses gh CLI token automatically

  cicd:
    # Uses glab CLI token automatically
    # projects: ["group/project"]  # Optional: limit to specific projects
    max_pipelines: 10

  docker:
    # Monitors local Docker containers
    # containers: ["web", "db"]  # Optional: filter specific containers

  weather:
    # OpenWeatherMap API
    # api_key: "${OPENWEATHER_API_KEY}"
    # city: "Paris"
    # units: "metric"
    # lang: "fr"

  system_cpu:
    metric: "cpu"
    # warn: 80  # % threshold for warning color

  system_ram:
    metric: "ram"
    # warn: 85  # % threshold for warning color

  spotify:
    # MPRIS2 D-Bus (auto-detects player: spotify, chrome, firefox, vlc)
